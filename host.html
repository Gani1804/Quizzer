<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<body>

<div class="container">
  <h2>Host Panel</h2>
  <h3>📁 Upload Quiz Excel</h3>
<input type="file" id="excelFile" accept=".xlsx, .xls" />
<button onclick="uploadExcel()">Upload</button>

  <button onclick="createQuiz()">Create Quiz</button>
  

  <h3>Quiz ID: <span id="quizId"></span></h3>
<h3>📱 Scan to Join</h3>
<div id="qrcode"></div>

  <input id="question" placeholder="Question"><br>
  <input id="o1" placeholder="Option 1"><br>
  <input id="o2" placeholder="Option 2"><br>
  <input id="o3" placeholder="Option 3"><br>
  <input id="o4" placeholder="Option 4"><br>
  <input id="correct" placeholder="Correct (1-4)"><br>

  <button onclick="sendQuestion()">Send</button>

  <h3>Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script src="app.js"></script>
</body>
</html>
